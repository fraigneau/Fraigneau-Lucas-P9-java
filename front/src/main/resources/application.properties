spring.application.name=front
spring.output.ansi.enabled=ALWAYS

# Server Configuration
server.port=8084

# Eureka Configuration
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true
eureka.instance.hostname=localhost

# Actuator endpoints
management.endpoints.web.exposure.include=health,info,gateway

# Date formatting
spring.mvc.format.date=dd/MM/yyyy
spring.jackson.date-format=dd/MM/yyyy
spring.jackson.time-zone=Europe/Paris

# JWT Configuration
jwt.secret=medilabo-solutions-secret-key-for-jwt-token-generation-and-validation-2025-very-long-secret-key
jwt.expiration=86400000
# JWT expiration en millisecondes (86400000 = 24 heures)

# Security Configuration
spring.security.user.name=medilabo
spring.security.user.password=password
spring.security.user.roles=USER

# Logging pour debugging JWT (à désactiver en production)
logging.level.com.medilabo.solutions.front.security=DEBUG
logging.level.org.springframework.security=DEBUG