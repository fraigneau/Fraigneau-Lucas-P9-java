<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title th:text="${pageTitle} + ' - Medilabo Solutions'">
      Formulaire Patient - Medilabo Solutions
    </title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 20px;
      }
      table {
        border-collapse: collapse;
        width: 100%;
        max-width: 500px;
        margin: 10px 0;
      }
      th,
      td {
        border: 1px solid #ddd;
        padding: 8px;
        text-align: left;
      }
      th {
        background-color: #f2f2f2;
      }
      input,
      select {
        width: 200px;
        padding: 5px;
      }
      .error {
        color: red;
      }
    </style>
  </head>
  <body>
    <h1 th:text="${pageTitle}">Formulaire Patient</h1>

    <p><a href="/home">← Retour à la liste</a></p>

    <!-- Messages -->
    <div th:if="${error}" class="error" th:text="${error}"></div>

    <!-- Formulaire Patient -->
    <form th:action="@{/patient/save}" method="post" th:object="${patient}">
      <input type="hidden" th:field="*{id}" />

      <table>
        <tr>
          <th>Prénom *</th>
          <td>
            <input type="text" th:field="*{firstname}" required />
            <div
              th:if="${#fields.hasErrors('firstname')}"
              class="error"
              th:errors="*{firstname}"
            ></div>
          </td>
        </tr>

        <tr>
          <th>Nom *</th>
          <td>
            <input type="text" th:field="*{lastname}" required />
            <div
              th:if="${#fields.hasErrors('lastname')}"
              class="error"
              th:errors="*{lastname}"
            ></div>
          </td>
        </tr>

        <tr>
          <th>Date de naissance *</th>
          <td>
            <input
              type="date"
              name="birthDate"
              th:value="${patient.birthDate != null ? patient.birthDate : ''}"
              required
            />
            <div
              th:if="${#fields.hasErrors('birthDate')}"
              class="error"
              th:errors="*{birthDate}"
            ></div>
          </td>
        </tr>

        <tr>
          <th>Genre *</th>
          <td>
            <select th:field="*{gender}" required>
              <option value="">Choisir</option>
              <option value="M">Masculin</option>
              <option value="F">Féminin</option>
            </select>
            <div
              th:if="${#fields.hasErrors('gender')}"
              class="error"
              th:errors="*{gender}"
            ></div>
          </td>
        </tr>

        <tr>
          <th>Téléphone</th>
          <td>
            <input type="tel" th:field="*{phoneNumber}" />
            <div
              th:if="${#fields.hasErrors('phoneNumber')}"
              class="error"
              th:errors="*{phoneNumber}"
            ></div>
          </td>
        </tr>

        <tr>
          <th>Adresse</th>
          <td>
            <input type="text" th:field="*{address}" />
            <div
              th:if="${#fields.hasErrors('address')}"
              class="error"
              th:errors="*{address}"
            ></div>
          </td>
        </tr>

        <tr>
          <td colspan="2">
            <button type="submit" th:text="${isEdit ? 'Modifier' : 'Créer'}">
              Enregistrer
            </button>
            <a href="/home">Annuler</a>
          </td>
        </tr>
      </table>
    </form>

    <p><small>* Champs obligatoires</small></p>

    <div th:if="${isEdit}">
      <hr />
      <p>
        <a th:href="@{'/notes/' + ${patient.id}}"
          >Voir les notes de ce patient</a
        >
      </p>
    </div>

    <footer>
      <hr />
      <p>&copy; 2024 Medilabo Solutions</p>
    </footer>
  </body>
</html>
