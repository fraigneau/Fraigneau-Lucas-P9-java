<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Connexion - Medilabo Solutions</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body
    class="d-flex justify-content-center align-items-center"
    style="height: 100vh"
  >
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-md-6 col-lg-4">
          <div class="login-card p-5 shadow border rounded">
            <!-- Logo et titre -->
            <div class="text-center mb-4">
              <h1 class="h3 mb-3 fw-bold text-primary">Medilabo Solutions</h1>
              <p class="text-muted">Connectez-vous à votre compte</p>
            </div>

            <!-- Messages d'alerte -->
            <div
              th:if="${error}"
              class="alert alert-danger alert-dismissible fade show"
              role="alert"
            >
              <i class="fas fa-exclamation-triangle me-2"></i>
              <span th:text="${error}">Erreur</span>
              <button
                type="button"
                class="btn-close"
                data-bs-dismiss="alert"
              ></button>
            </div>

            <div
              th:if="${param.logout}"
              class="alert alert-info alert-dismissible fade show"
              role="alert"
            >
              <i class="fas fa-sign-out-alt me-2"></i>
              Vous avez été déconnecté avec succès
              <button
                type="button"
                class="btn-close"
                data-bs-dismiss="alert"
              ></button>
            </div>

            <div
              th:if="${success}"
              class="alert alert-success alert-dismissible fade show"
              role="alert"
            >
              <i class="fas fa-check-circle me-2"></i>
              <span th:text="${success}">Succès</span>
              <button
                type="button"
                class="btn-close"
                data-bs-dismiss="alert"
              ></button>
            </div>

            <!-- Formulaire de connexion -->
            <form
              th:action="@{/login}"
              method="post"
              th:object="${loginRequest}"
            >
              <div class="mb-4">
                <label for="username" class="form-label fw-semibold">
                  <i class="fas fa-user me-2"></i>Nom d'utilisateur
                </label>
                <input
                  type="text"
                  id="username"
                  th:field="*{username}"
                  class="form-control"
                  placeholder="Entrez votre nom d'utilisateur"
                  required
                  autofocus
                />
                <div
                  th:if="${#fields.hasErrors('username')}"
                  class="text-danger mt-1 small"
                  th:errors="*{username}"
                ></div>
              </div>

              <div class="mb-4">
                <label for="password" class="form-label fw-semibold">
                  <i class="fas fa-lock me-2"></i>Mot de passe
                </label>
                <input
                  type="password"
                  id="password"
                  th:field="*{password}"
                  class="form-control"
                  placeholder="Entrez votre mot de passe"
                  required
                />
                <div
                  th:if="${#fields.hasErrors('password')}"
                  class="text-danger mt-1 small"
                  th:errors="*{password}"
                ></div>
              </div>

              <div class="d-grid mb-4">
                <button type="submit" class="btn btn-primary btn-login">
                  <i class="fas fa-sign-in-alt me-2"></i>Se connecter
                </button>
              </div>
            </form>

            <!-- Informations de test -->
            <div class="mt-4 p-3 bg-light rounded">
              <h6 class="fw-bold mb-2">Comptes de test :</h6>
              <div class="small text-muted">
                <div><strong>Admin :</strong> admin / 123</div>
              </div>
            </div>

            <!-- Footer -->
            <div class="text-center mt-4">
              <small class="text-muted">
                &copy; 2025 Medilabo Solutions. Tous droits réservés.
              </small>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
      // Auto-dismiss alerts après 5 secondes
      setTimeout(function () {
        var alerts = document.querySelectorAll(".alert");
        alerts.forEach(function (alert) {
          var bsAlert = new bootstrap.Alert(alert);
          bsAlert.close();
        });
      }, 5000);

      // Animation d'entrée
      document.addEventListener("DOMContentLoaded", function () {
        const card = document.querySelector(".login-card");
        card.style.opacity = "0";
        card.style.transform = "translateY(30px)";

        setTimeout(function () {
          card.style.transition = "all 0.6s ease";
          card.style.opacity = "1";
          card.style.transform = "translateY(0)";
        }, 100);
      });
    </script>
  </body>
</html>
