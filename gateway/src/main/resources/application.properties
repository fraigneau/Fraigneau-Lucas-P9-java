spring.application.name=gateway
spring.output.ansi.enabled=ALWAYS

# Server Configuration
server.port=8080

# Eureka Configuration
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true
eureka.instance.hostname=localhost

# Gateway WebFlux - Discovery automatique (NOUVELLES CLÉS)
spring.cloud.gateway.server.webflux.discovery.locator.enabled=true
spring.cloud.gateway.server.webflux.discovery.locator.lower-case-service-id=true

# Gateway WebFlux - Routes manuelles (NOUVELLES CLÉS)
spring.cloud.gateway.server.webflux.routes[0].id=patient
spring.cloud.gateway.server.webflux.routes[0].uri=lb://patient
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/api/patient/**

spring.cloud.gateway.server.webflux.routes[1].id=note
spring.cloud.gateway.server.webflux.routes[1].uri=lb://note
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/api/note/**

spring.cloud.gateway.server.webflux.routes[2].id=assessment
spring.cloud.gateway.server.webflux.routes[2].uri=lb://assessment
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/api/assessment/**

# Actuator endpoints
management.endpoints.web.exposure.include=health,info,gateway

# Logging (optionnel)
logging.level.org.springframework.cloud.gateway=DEBUG
logging.level.reactor.netty=DEBUG