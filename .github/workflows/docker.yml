name: Docker image build & push

on:
  workflow_run:
    workflows: ["Microservices Build & Test"]
    types: [completed]
    conclusions: [success]
    branches: [main, dev, docker/image]

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: docker.io
  IMAGE_OWNER: ${{ secrets.DOCKER_USERNAME }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [eureka, patient, note, assessment, gateway, front]

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download JAR artifact
        id: dl
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          run-id: ${{ github.event.workflow_run.id }}
          repository: ${{ github.repository }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          name: ${{ matrix.service }}-jar
          path: ${{ matrix.service }}/target/

      - name: Abort step if JAR missing
        if: steps.dl.outcome == 'failure'
        run: |
          echo "ℹ️ No JAR for ${{ matrix.service }} – skipping image build."
          # On écrit un marqueur pour le résumé
          echo "skip=true" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        if: steps.dl.outcome == 'success'
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: steps.dl.outcome == 'success'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract Docker metadata
        if: steps.dl.outcome == 'success'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/medilabo-${{ matrix.service }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & push image
        if: steps.dl.outcome == 'success'
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service }}
          file: ${{ matrix.service }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64

      - name: Append to summary
        if: always()
        run: |
          if [ "${{ steps.dl.outcome }}" = "success" ]; then
            status="${{ job.status }}"
            icon="✅"
            [ "$status" != "success" ] && icon="❌"
            echo "${icon} **${{ matrix.service }}** – $status" >> $GITHUB_STEP_SUMMARY
          else
            echo "⏭️ **${{ matrix.service }}** – skipped (no JAR)" >> $GITHUB_STEP_SUMMARY
          fi
