name: Docker imegage build & push

on:
  workflow_run:
    workflows: ["Microservices Build & Test"]
    types: [completed]
    conclusions: [success]
    branches: [main, dev, docker/image]

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker-build-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [eureka, patient, note, assessment, gateway, front]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          run-id: ${{ github.event.workflow_run.id }}
          name: ${{ matrix.service }}-jar
          path: ${{ matrix.service }}/target/

      - name: Ensure JAR present
        run: |
          ls ${{ matrix.service }}/target/*.jar >/dev/null \
            || { echo "❌ JAR missing for ${{ matrix.service }}"; exit 1; }

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: docker.io/${{ secrets.DOCKER_USERNAME }}/medilabo-${{ matrix.service }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service }}
          file: ${{ matrix.service }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
