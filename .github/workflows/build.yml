name: Microservices Build & Test

on:
  push:
    branches:
      - 'feat/*'
      - 'test/*'
      - dev
      - 'docker/*'
  pull_request:
    branches: [main, dev]
  workflow_dispatch:
    inputs:
      force_full:
        description: 'Build & test all services (override change detection)'
        required: false
        default: 'false'
        type: boolean

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.set.outputs.services }}
    steps:
      - uses: actions/checkout@v4

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            patient:      'patient/**'
            note:         'note/**'
            assessment:   'assessment/**'
            front:        'front/**'
            gateway:      'gateway/**'
            eureka:       'eureka/**'

      - name: Build JSON matrix
        id: set
        shell: bash
        run: |
          set -euo pipefail

          FULL_BUILD=false

          # 1) Commit message contains [build-all]
          COMMIT_MSG=$(git log -1 --pretty=%B)
          [[ "$COMMIT_MSG" == *"[build-all]"* ]] && FULL_BUILD=true

          # 2) Manual trigger with force_full=true
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ github.event.inputs.force_full }}" == "true" ]]; then
            FULL_BUILD=true
          fi

          # 3) If no changes detected, set services to empty array
          if [[ "${{ steps.filter.outputs.patient }}" == 'false' && \
                "${{ steps.filter.outputs.note }}" == 'false' && \
                "${{ steps.filter.outputs.assessment }}" == 'false' && \
                "${{ steps.filter.outputs.front }}" == 'false' && \
                "${{ steps.filter.outputs.gateway }}" == 'false' && \
                "${{ steps.filter.outputs.eureka }}" == 'false' ]]; then
            echo "No changes detected, skipping build."
            echo "services=[]" >> $GITHUB_OUTPUT
            exit 0
          fi

          # 4) If PR FULL_BUILD
          # If this is a pull request, force full build
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            FULL_BUILD=true
          fi

          declare -a services
          if $FULL_BUILD; then
            services=(patient note assessment front gateway eureka)
          else
            [[ "${{ steps.filter.outputs.patient }}"    == 'true' ]] && services+=(patient)
            [[ "${{ steps.filter.outputs.note }}"       == 'true' ]] && services+=(note)
            [[ "${{ steps.filter.outputs.assessment }}" == 'true' ]] && services+=(assessment)
            [[ "${{ steps.filter.outputs.front }}"      == 'true' ]] && services+=(front)
            [[ "${{ steps.filter.outputs.gateway }}"    == 'true' ]] && services+=(gateway)
            [[ "${{ steps.filter.outputs.eureka }}"     == 'true' ]] && services+=(eureka)
          fi

          # Build a valid JSON array of quoted service names
          if [ ${#services[@]} -eq 0 ]; then
            json="[]"
          else
            joined=$(printf ',"%s"' "${services[@]}")
            json="[${joined:1}]"
          fi

          echo "Services to build: $json"
          echo "services=$json" >> $GITHUB_OUTPUT

  build-test:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.services != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.services) }}

    env:
      MAVEN_OPTS: -Dmaven.test.failure.ignore=false

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Cache Maven repository
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ matrix.service }}-${{ hashFiles(format('{0}/pom.xml', matrix.service)) }}
          restore-keys: |
            ${{ runner.os }}-m2-${{ matrix.service }}-
            ${{ runner.os }}-m2-

      - name: Build & Test ${{ matrix.service }}
        working-directory: ./${{ matrix.service }}
        run: mvn -B clean package test jacoco:report javadoc:javadoc surefire-report:report

      - name: Upload reports (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.service }}-reports
          path: ${{ matrix.service }}/target/site

      - name: Upload JAR (success only)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.service }}-jar
          path: ${{ matrix.service }}/target/*.jar

      - name: Append to build summary
        if: always()
        run: |
          ICON="❌"; [[ "${{ job.status }}" == "success" ]] && ICON="✅"
          echo "${ICON} **${{ matrix.service }}** – ${{ job.status }}" >> $GITHUB_STEP_SUMMARY

  build-summary:
    needs: build-test
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Final status
        run: |
          if [ "${{ needs.build-test.result }}" = "success" ]; then
            echo "🎉 **All builds succeeded**" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ needs.build-test.result }}" = "skipped" ]; then
            echo "⚠️ **No service required building (skipped)**" >> $GITHUB_STEP_SUMMARY
          else
            echo "🚨 **Some builds failed – see above for details**" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
