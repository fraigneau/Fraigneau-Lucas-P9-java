name: Microservices Build & Test

on:
  push:
    branches:
      - "feat/*"
      - "test/*"
      - dev
      - "docker/*"
  pull_request:
    branches: [main, dev]

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.set.outputs.services }}
    steps:
      - uses: actions/checkout@v4

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            patient:      'patient/**'
            note:         'note/**'
            assessment:   'assessment/**'
            front:        'front/**'
            gateway:      'gateway/**'
            eureka:       'eureka/**'

      - name: Build JSON matrix
        id: set
        run: |
          services=()
          if [ "${{ steps.filter.outputs.patient }}"   = "true" ]; then services+=("\"patient\""); fi
          if [ "${{ steps.filter.outputs.note }}"      = "true" ]; then services+=("\"note\""); fi
          if [ "${{ steps.filter.outputs.assessment }}"= "true" ]; then services+=("\"assessment\""); fi
          if [ "${{ steps.filter.outputs.front }}"     = "true" ]; then services+=("\"front\""); fi
          if [ "${{ steps.filter.outputs.gateway }}"   = "true" ]; then services+=("\"gateway\""); fi
          if [ "${{ steps.filter.outputs.eureka }}"    = "true" ]; then services+=("\"eureka\""); fi
          json="[${services[*]}]"
          echo "Services to build: $json"
          echo "services=$json" >> $GITHUB_OUTPUT

  build-test:
    needs: detect-changes
    if: ${{ fromJson(needs.detect-changes.outputs.services) != '' }} # skip si rien à faire
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.services) }}
    env:
      MAVEN_OPTS: -Dmaven.test.failure.ignore=false
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Cache local Maven repo
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ matrix.service }}-${{ hashFiles(format('{0}/pom.xml', matrix.service)) }}
          restore-keys: |
            ${{ runner.os }}-m2-${{ matrix.service }}-
            ${{ runner.os }}-m2-

      - name: Build & test ${{ matrix.service }}
        working-directory: ./${{ matrix.service }}
        run: |
          mvn -B clean package test jacoco:report javadoc:javadoc surefire-report:report

      - name: Upload reports (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.service }}-reports
          path: ${{ matrix.service }}/target/site

      - name: Upload JAR (success only)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.service }}-jar
          path: ${{ matrix.service }}/target/*.jar

      - name: Append to build summary
        if: always()
        run: |
          ICON="❌"; [ "${{ job.status }}" = "success" ] && ICON="✅"
          echo "${ICON} **${{ matrix.service }}** – ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
