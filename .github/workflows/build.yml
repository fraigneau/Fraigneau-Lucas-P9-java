name: Microservices Build & Test

on:
  push:
    branches: ["feat/*"]
  pull_request:
    branches: [main, dev]

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      patient: ${{ steps.changes.outputs.patient }}
      note: ${{ steps.changes.outputs.note }}
      assessment: ${{ steps.changes.outputs.assessment }}
      front: ${{ steps.changes.outputs.front }}
      gateway: ${{ steps.changes.outputs.gateway }}
      eureka: ${{ steps.changes.outputs.eureka }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changes (only for push events)
        if: github.event_name == 'push'
        uses: dorny/paths-filter@v2
        id: changes
        with:
          filters: |
            patient:
              - 'patient/**'
            note:
              - 'note/**'
            assessment:
              - 'assessment/**'

      - name: Set all services as changed (for pull requests)
        if: github.event_name == 'pull_request'
        id: force-changes
        run: |
          echo "patient=true" >> $GITHUB_OUTPUT
          echo "note=true" >> $GITHUB_OUTPUT
          echo "assessment=true" >> $GITHUB_OUTPUT

  build-patient:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.patient == 'true'
    continue-on-error: true
    outputs:
      start-time: ${{ steps.start-time.outputs.time }}
      status: ${{ steps.build-status.outputs.status }}
    steps:
      - name: Record start time
        id: start-time
        run: echo "time=$(date +%s)" >> $GITHUB_OUTPUT

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Cache Maven dependencies
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-patient-${{ hashFiles('patient/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2-patient

      - name: Run tests with coverage
        working-directory: ./patient
        run: |
          mvn clean package test jacoco:report javadoc:javadoc surefire-report:report

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: patient-test-results
          path: |
            patient/target/site/surefire/
            patient/target/site/jacoco/
            patient/target/site/apidocs/

      - name: Upload JAR Artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: patient-jar
          path: patient/target/*.jar

      - name: Set build status
        id: build-status
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "status=✅ Success" >> $GITHUB_OUTPUT
          else
            echo "status=❌ Failed" >> $GITHUB_OUTPUT
          fi

  build-note:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.note == 'true'
    continue-on-error: true
    outputs:
      start-time: ${{ steps.start-time.outputs.time }}
      status: ${{ steps.build-status.outputs.status }}
    steps:
      - name: Record start time
        id: start-time
        run: echo "time=$(date +%s)" >> $GITHUB_OUTPUT

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Cache Maven dependencies
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-note-${{ hashFiles('note/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2-note

      - name: Run tests with coverage
        working-directory: ./note
        run: |
          mvn clean package test jacoco:report javadoc:javadoc surefire-report:report

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: note-test-results
          path: |
            note/target/site/surefire/
            note/target/site/jacoco/
            note/target/site/apidocs/

      - name: Upload JAR Artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: note-jar
          path: note/target/*.jar

      - name: Set build status
        id: build-status
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "status=✅ Success" >> $GITHUB_OUTPUT
          else
            echo "status=❌ Failed" >> $GITHUB_OUTPUT
          fi

  build-assessment:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.assessment == 'true'
    continue-on-error: true
    outputs:
      start-time: ${{ steps.start-time.outputs.time }}
      status: ${{ steps.build-status.outputs.status }}
    steps:
      - name: Record start time
        id: start-time
        run: echo "time=$(date +%s)" >> $GITHUB_OUTPUT

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Cache Maven dependencies
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-assessment-${{ hashFiles('assessment/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2-assessment

      - name: Run tests with coverage
        working-directory: ./assessment
        run: |
          mvn clean package test jacoco:report javadoc:javadoc surefire-report:report

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: assessment-test-results
          path: |
            assessment/target/site/surefire/
            assessment/target/site/jacoco/
            assessment/target/site/apidocs/

      - name: Upload JAR Artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: assessment-jar
          path: assessment/target/*.jar

      - name: Set build status
        id: build-status
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "status=✅ Success" >> $GITHUB_OUTPUT
          else
            echo "status=❌ Failed" >> $GITHUB_OUTPUT
          fi

  build-front:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.front == 'true'
    continue-on-error: true
    outputs:
      start-time: ${{ steps.start-time.outputs.time }}
      status: ${{ steps.build-status.outputs.status }}
    steps:
      - name: Record start time
        id: start-time
        run: echo "time=$(date +%s)" >> $GITHUB_OUTPUT

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Cache Maven dependencies
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-front-${{ hashFiles('front/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2-front

      - name: Run tests with coverage
        working-directory: ./front
        run: |
          mvn clean package test jacoco:report javadoc:javadoc surefire-report:report

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: front-test-results
          path: |
            front/target/site/surefire/
            front/target/site/jacoco/
            front/target/site/apidocs/

      - name: Upload JAR Artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: front-jar
          path: front/target/*.jar

      - name: Set build status
        id: build-status
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "status=✅ Success" >> $GITHUB_OUTPUT
          else
            echo "status=❌ Failed" >> $GITHUB_OUTPUT
          fi

  build-gateway:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.gateway == 'true'
    continue-on-error: true
    outputs:
      start-time: ${{ steps.start-time.outputs.time }}
      status: ${{ steps.build-status.outputs.status }}
    steps:
      - name: Record start time
        id: start-time
        run: echo "time=$(date +%s)" >> $GITHUB_OUTPUT

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Cache Maven dependencies
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-gateway-${{ hashFiles('gateway/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2-gateway

      - name: Run tests with coverage
        working-directory: ./gateway
        run: |
          mvn clean package

      - name: Upload JAR Artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: gateway-jar
          path: gateway/target/*.jar

      - name: Set build status
        id: build-status
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "status=✅ Success" >> $GITHUB_OUTPUT
          else
            echo "status=❌ Failed" >> $GITHUB_OUTPUT
          fi

  build-eureka:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.eureka == 'true'
    continue-on-error: true
    outputs:
      start-time: ${{ steps.start-time.outputs.time }}
      status: ${{ steps.build-status.outputs.status }}
    steps:
      - name: Record start time
        id: start-time
        run: echo "time=$(date +%s)" >> $GITHUB_OUTPUT

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Cache Maven dependencies
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-eureka-${{ hashFiles('eureka/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2-eureka

      - name: Run
        working-directory: ./eureka
        run: |
          mvn clean package

      - name: Upload JAR Artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: eureka-jar
          path: eureka/target/*.jar

      - name: Set build status
        id: build-status
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "status=✅ Success" >> $GITHUB_OUTPUT
          else
            echo "status=❌ Failed" >> $GITHUB_OUTPUT
          fi

  build-summary:
    runs-on: ubuntu-latest
    needs: [detect-changes, build-patient, build-note, build-assessment]
    if: always()
    steps:
      - name: Build Summary
        run: |
          echo "# 🚀 Build Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Info de base
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Author:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Résultats par service
          echo "## Services Status" >> $GITHUB_STEP_SUMMARY

          # Patient
          if [ "${{ needs.detect-changes.outputs.patient }}" = "true" ]; then
            if [ "${{ needs.build-patient.result }}" = "success" ]; then
              echo "✅ Patient - Build OK" >> $GITHUB_STEP_SUMMARY
            else
              echo "❌ Patient - Build Failed" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "⏭️ Patient - Skipped (no changes)" >> $GITHUB_STEP_SUMMARY
          fi

          # Note
          if [ "${{ needs.detect-changes.outputs.note }}" = "true" ]; then
            if [ "${{ needs.build-note.result }}" = "success" ]; then
              echo "✅ Note - Build OK" >> $GITHUB_STEP_SUMMARY
            else
              echo "❌ Note - Build Failed" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "⏭️ Note - Skipped (no changes)" >> $GITHUB_STEP_SUMMARY
          fi

          # Assessment
          if [ "${{ needs.detect-changes.outputs.assessment }}" = "true" ]; then
            if [ "${{ needs.build-assessment.result }}" = "success" ]; then
              echo "✅ Assessment - Build OK" >> $GITHUB_STEP_SUMMARY
            else
              echo "❌ Assessment - Build Failed" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "⏭️ Assessment - Skipped (no changes)" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY

          # Résultat final
          FAILED=0
          if [ "${{ needs.build-patient.result }}" = "failure" ]; then FAILED=1; fi
          if [ "${{ needs.build-note.result }}" = "failure" ]; then FAILED=1; fi
          if [ "${{ needs.build-assessment.result }}" = "failure" ]; then FAILED=1; fi

          if [ $FAILED -eq 1 ]; then
            echo "## 🚨 Some builds failed!" >> $GITHUB_STEP_SUMMARY
            echo "Check the logs above to fix the issues." >> $GITHUB_STEP_SUMMARY
            exit 1
          else
            echo "## 🎉 All builds successful!" >> $GITHUB_STEP_SUMMARY
          fi
