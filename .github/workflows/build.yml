name: Microservices Build & Test

on:
  push:
    branches: ["feat/*"]
  pull_request:
    branches: [main, dev]

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      patient: ${{ steps.changes.outputs.patient }}
      history: ${{ steps.changes.outputs.history }}
      assessment: ${{ steps.changes.outputs.assessment }}
      gateway: ${{ steps.changes.outputs.gateway }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changes
        uses: dorny/paths-filter@v2
        id: changes
        with:
          filters: |
            patient:
              - 'patient/**'
            note:
              - 'note/**'
            assessment:
              - 'assessment/**'
            gateway:
              - 'gateway/**'

  build-patient:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.patient == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Cache Maven dependencies
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-patient-${{ hashFiles('patient/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2-patient

      - name: Run tests with coverage
        working-directory: ./patient
        run: |
          ./mvnw clean package test jacoco:report javadoc:javadoc surefire-report:report

      - name: Generate Javadoc & Build JAR
        working-directory: ./patient
        run: ./mvnw javadoc:javadoc

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: patient-test-results
          path: |
            patient/target/site/surefire-reports/
            patient/target/site/jacoco/
            patient/target/site/apidocs/

      - name: Upload JAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: patient-jar
          path: patient/target/*.jar

  # Job récapitulatif
  build-summary:
    runs-on: ubuntu-latest
    needs:
      [
        detect-changes,
        build-patient,
        build-history,
        build-assessment,
        build-gateway,
      ]
    if: always()
    steps:
      - name: Build Summary
        run: |
          echo "## 🚀 Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Changed | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|---------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Patient | ${{ needs.detect-changes.outputs.patient }} | ${{ needs.build-patient.result || 'skipped' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| History | ${{ needs.detect-changes.outputs.history }} | ${{ needs.build-history.result || 'skipped' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Assessment | ${{ needs.detect-changes.outputs.assessment }} | ${{ needs.build-assessment.result || 'skipped' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Gateway | ${{ needs.detect-changes.outputs.gateway }} | ${{ needs.build-gateway.result || 'skipped' }} |" >> $GITHUB_STEP_SUMMARY
